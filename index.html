<!--
  ============================================================
  DUTTON RANCH WORLD CUP POOL — DASHBOARD
  ============================================================
  v1.1 — Initial release
  v1.2 — Null fix, eyebrow update, text-muted brightness,
          Debut/4th emoji updates, footer versioning
  v1.3 — 🎗️ 4th emoji (all 3 locations), trophy favicon,
          refresh button moved to Last Updated status item,
          footer updated (removed Google Sheets line, added version)
  v1.4 — Player name 20px (unchanged), team names 15px, 1st pick gold /
          2nd pick muted with white bold dot separator,
          bot treatment (col J Is Bot), prize pool excludes bots,
          Last Updated reads from Meta tab B1, refresh btn removed
  v1.5 — 1st pick gold metallic shimmer gradient (flag isolated),
          2nd pick silver metallic shimmer gradient (flag isolated),
          flag+team spacing enforced,
          Real Name subtitle (teal) from Leaderboard col K — blank if not set
  ============================================================
  SHEET ID: 13tYn4PD4_09pZjxbfIO3isLue7VroJaPd5l-olkd-dA
  Leaderboard tab cols: A=Rank B=Name C=Total D=1st E=2nd
    F=3rd G=4th H=Debut I=FanFav J=IsBot
  Meta tab: A1=Last Updated label, B1=date value
  ============================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
<title>2026 Dutton Ranch World Cup Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F0D060;
    --red: #C8102E;
    --dark: #0a0a0f;
    --dark-2: #111118;
    --dark-3: #1a1a24;
    --dark-4: #22222e;
    --text: #e8e8f0;
    --text-muted: #a0a0c0;
    --green: #00843D;
    --blue: #003DA5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-art {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-art::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,61,165,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(200,16,46,0.14) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(212,175,55,0.06) 0%, transparent 70%);
  }

  .bg-soccer-ball {
    position: absolute;
    width: 600px;
    height: 600px;
    top: -100px;
    right: -150px;
    opacity: 0.04;
    border-radius: 50%;
    border: 80px solid white;
    animation: slowSpin 60s linear infinite;
  }

  .bg-soccer-ball::before {
    content: '';
    position: absolute;
    width: 80px;
    height: 80px;
    background: white;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .bg-lines {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 80px,
        rgba(255,255,255,0.015) 80px,
        rgba(255,255,255,0.015) 81px
      );
  }

  @keyframes slowSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ── LAYOUT ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 40px 0 36px;
    position: relative;
  }

  .header-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
    text-decoration: none;
    -webkit-text-decoration: none;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 88px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: white;
    text-shadow: 0 0 60px rgba(212,175,55,0.3);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
    text-decoration: none;
    -webkit-text-decoration: none;
  }

  .header-title span {
    color: var(--gold);
    text-decoration: none;
    -webkit-text-decoration: none;
  }

  .header-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--text-muted);
    margin-top: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  .header-divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
  }

  .status-item {
    text-align: center;
  }

  .status-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .status-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
  }

  /* ── SECTION HEADERS ── */
  .section-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: white;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(212,175,55,0.4), transparent);
  }

  /* ── LEADERBOARD ── */
  .leaderboard {
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.6s;
  }

  .lb-header-row {
    display: grid;
    grid-template-columns: 44px 1fr 80px;
    gap: 8px;
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .lb-row {
    display: grid;
    grid-template-columns: 44px 1fr 80px;
    gap: 8px;
    align-items: center;
    padding: 14px 16px;
    margin-bottom: 6px;
    border-radius: 8px;
    background: var(--dark-3);
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .lb-row::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--text-muted);
    opacity: 0.3;
  }

  .lb-row.rank-1::before { background: var(--gold); opacity: 1; }
  .lb-row.rank-2::before { background: #C0C0C0; opacity: 1; }
  .lb-row.rank-3::before { background: #CD7F32; opacity: 1; }

  .lb-row.rank-1 { background: linear-gradient(135deg, rgba(212,175,55,0.08), var(--dark-3)); }

  .lb-row:hover {
    background: var(--dark-4);
    border-color: rgba(212,175,55,0.2);
    transform: translateX(2px);
  }

  .lb-row.expanded {
    border-color: rgba(212,175,55,0.3);
  }

  .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1;
  }

  .rank-1 .rank-num { color: var(--gold); }
  .rank-2 .rank-num { color: #C0C0C0; }
  .rank-3 .rank-num { color: #CD7F32; }

  .player-info { min-width: 0; }

  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-picks-preview {
    font-size: 15px;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-real-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    color: #4eb8b8;
    letter-spacing: 0.04em;
    margin-top: 1px;
  }

  .bot-notice {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: #4eb8b8;
    letter-spacing: 0.5px;
    margin-top: 3px;
  }

  .lb-row.is-bot {
    border-left: 3px solid rgba(78,184,184,0.35);
  }

  .lb-row.is-bot .total-pts {
    color: #606080;
  }

  .player-total {
    text-align: right;
  }

  .total-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--gold);
    line-height: 1;
  }

  .total-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── EXPANDED PICKS ── */
  .picks-detail {
    display: none;
    padding: 12px 16px 4px;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin-top: 10px;
    grid-column: 1 / -1;
  }

  .picks-detail.open { display: block; }

  .picks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }

  .pick-chip {
    background: var(--dark-4);
    border-radius: 6px;
    padding: 8px 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .pick-chip-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .pick-chip-team {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pick-chip-pts {
    font-size: 12px;
    color: var(--gold);
    margin-top: 2px;
  }

  /* ── PICKS TABLE (mobile-friendly) ── */
  .picks-section {
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.8s;
  }

  .picks-table {
    width: 100%;
    border-collapse: collapse;
  }

  .picks-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .picks-table td {
    padding: 12px 10px;
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }

  .picks-table tr:hover td {
    background: rgba(255,255,255,0.02);
  }

  .picks-table .player-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── LOADING / ERROR ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(212,175,55,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }


  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .picks-section { display: none; }
    .header-title { font-size: 52px; }
    .status-bar { gap: 20px; }
    .lb-row { padding: 12px; }
  }

  .tab-bar {
    display: none;
    margin-bottom: 24px;
  }

  @media (max-width: 600px) {
    .tab-bar { display: flex; gap: 0; border-radius: 8px; overflow: hidden; background: var(--dark-3); }
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--dark-4);
    color: var(--gold);
  }

  .mobile-picks { display: none; }

  @media (max-width: 600px) {
    .mobile-picks.visible { display: block; }
    .leaderboard.hidden { display: none; }
  }
</style>
</head>
<body>

<div class="bg-art">

  <div class="bg-lines"></div>

<div class="container">

  <div class="status-bar" id="statusBar">

    </div>

      <div class="status-label">Prize Pool</div>
      <div class="status-value" id="statPrize">—</div>
    </div>

      </div>

</div>

<script>
const SHEET_ID = '13tYn4PD4_09pZjxbfIO3isLue7VroJaPd5l-olkd-dA';
const LEADERBOARD_GID = '0'; // default sheet (Leaderboard tab)

// We'll fetch the Leaderboard tab by name using the CSV export endpoint
// which works for public sheets without an API key
async function loadData() {
  document.getElementById('leaderboardRows').innerHTML = `<div class="loading"><div class="loading-spinner"></div>Loading standings...</div>`;

  try {
    const [leaderboardData, metaData] = await Promise.all([
      fetchSheet('Leaderboard'),
      fetchSheet('Meta')
    ]);
    renderLeaderboard(leaderboardData);
    updateStatus(leaderboardData, metaData);
  } catch(e) {
    document.getElementById('leaderboardRows').innerHTML = `<div class="loading">⚠️ Could not load data. Make sure the sheet is set to "Anyone with the link can view".<br><br><small>${e.message}</small></div>`;
  }
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  // gviz wraps response in /*O_o*/ google.visualization.Query.setResponse({...});
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return parseGviz(json);
}

function parseGviz(json) {
  const rows = json.table.rows;
  const cols = json.table.cols;
  // Build header row from col labels
  const header = cols.map(c => c.label || '');
  const data = [header];
  rows.forEach(row => {
    const rawCells = row.c || [];
    while (rawCells.length < cols.length) rawCells.push(null);
    const cells = rawCells.map(cell => {
      if (cell === null || cell === undefined) return '';
      if (cell.v === null || cell.v === undefined) return '';
      return cell.f !== undefined && cell.f !== null ? cell.f : String(cell.v);
    });
    data.push(cells);
  });
  return data;
}

function renderLeaderboard(data) {
  if (!data || data.length < 2) {
    document.getElementById('leaderboardRows').innerHTML = '<div class="loading">No data yet — check back after June 11!</div>';
    return;
  }

  // Row 0 = headers, rows 1+ = players
  // Cols: A=Rank, B=Player, C=Total, D=1st, E=2nd, F=3rd, G=4th, H=Debut, I=FanFav, J=IsBot, K=RealName
  const players = data.slice(1).filter(r => r[1] && r[1].trim() !== '');

  let html = '';
  players.forEach((row, idx) => {
    const rank = row[0] || (idx + 1);
    const name = row[1] || '';
    const total = row[2] || '0';
    const p1 = row[3] || '—';
    const p2 = row[4] || '—';
    const p3 = row[5] || '—';
    const p4 = row[6] || '—';
    const virgin = row[7] || '—';
    const fanfav = row[8] || '—';
    const isBot = (row[9] || '').trim().toUpperCase() === 'TRUE';
    const realName = (row[10] || '').trim();

    const rankClass = rank == 1 ? 'rank-1' : rank == 2 ? 'rank-2' : rank == 3 ? 'rank-3' : '';
    const botClass = isBot ? 'is-bot' : '';

    const t1raw = p1.split(' - ')[0];
    const t2raw = p2.split(' - ')[0];
    const t1parts = t1raw.indexOf(' ') > -1 ? [t1raw.slice(0, t1raw.indexOf(' ')), t1raw.slice(t1raw.indexOf(' ') + 1)] : ['', t1raw];
    const t2parts = t2raw.indexOf(' ') > -1 ? [t2raw.slice(0, t2raw.indexOf(' ')), t2raw.slice(t2raw.indexOf(' ') + 1)] : ['', t2raw];
    const goldStyle = `background:linear-gradient(90deg,#b8882a 0%,#D4AF37 30%,#f5e27a 55%,#D4AF37 75%,#a87c20 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;
    const silverStyle = `background:linear-gradient(90deg,#707085 0%,#b0b0c8 20%,#e8e8f4 45%,#ffffff 55%,#c0c0d8 75%,#808090 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;
    const preview = `<span>${t1parts[0]} </span><span style="${goldStyle}">${t1parts[1]}</span><span style="color:#ffffff;font-weight:700;">&nbsp;&nbsp;·&nbsp;&nbsp;</span><span>${t2parts[0]} </span><span style="${silverStyle}">${t2parts[1]}</span>`;
    const botNotice = isBot ? `<div class="bot-notice">BOT — Not eligible for prize pool</div>` : '';

    html += `
      <div class="lb-row ${rankClass} ${botClass}" onclick="togglePicks(this)">
        <div class="rank-num">${rank}</div>
        <div class="player-info">
          <div class="player-name">${name}</div>
          ${realName ? `<div class="player-real-name">${realName}</div>` : ''}
          ${botNotice}
          <div class="player-picks-preview">${preview}</div>
        </div>
        <div class="player-total">
          <div class="total-pts">${total}</div>
          <div class="total-label">pts</div>
        </div>
        <div class="picks-detail" style="grid-column:1/-1">
          <div class="picks-grid">
            ${pickChip('🥇 1st', p1)}
            ${pickChip('🥈 2nd', p2)}
            ${pickChip('🥉 3rd', p3)}
            ${pickChip('🎗️ 4th', p4)}
            ${pickChip('💫 Debut', virgin)}
            ${pickChip('⭐ Fan Fav', fanfav)}
          </div>
        </div>
      </div>`;
  });

  document.getElementById('leaderboardRows').innerHTML = html;

  // Also render picks table
  renderPicksTable(players);
  renderMobilePicks(players);
}

function pickChip(label, value) {
  const parts = value.split(' - ');
  const team = parts[0] || value;
  const pts = parts[1] || '';
  return `<div class="pick-chip">
    <div class="pick-chip-label">${label}</div>
    <div class="pick-chip-team">${team}</div>
    ${pts ? `<div class="pick-chip-pts">${pts}</div>` : ''}
  </div>`;
}

function togglePicks(row) {
  const detail = row.querySelector('.picks-detail');
  if (!detail) return;
  const isOpen = detail.classList.contains('open');
  // Close all
  document.querySelectorAll('.picks-detail.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.lb-row.expanded').forEach(r => r.classList.remove('expanded'));
  if (!isOpen) {
    detail.classList.add('open');
    row.classList.add('expanded');
  }
}

function renderPicksTable(players) {
  let html = `<table class="picks-table">
    <thead><tr>
      <th>Player</th>
      <th>🥇 1st</th>
      <th>🥈 2nd</th>
      <th>🥉 3rd</th>
      <th>🎗️ 4th</th>
      <th>💫 Debut</th>
      <th>⭐ Fan Fav</th>
    </tr></thead><tbody>`;

  players.forEach(row => {
    const name = row[1];
    const picks = [row[3],row[4],row[5],row[6],row[7],row[8]].map(p => {
      if (!p) return '<td>—</td>';
      const team = p.split(' - ')[0];
      return `<td>${team}</td>`;
    });
    html += `<tr><td class="player-cell">${name}</td>${picks.join('')}</tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('picksTableWrap').innerHTML = html;
}

function renderMobilePicks(players) {
  let html = '<div class="section-header">⚽ All Picks</div>';
  players.forEach(row => {
    const name = row[1];
    const picks = [
      ['🥇 1st', row[3]], ['🥈 2nd', row[4]], ['🥉 3rd', row[5]],
      ['🎗️ 4th', row[6]], ['💫 Debut', row[7]], ['⭐ Fan Fav', row[8]]
    ];
    html += `<div style="background:var(--dark-3);border-radius:8px;padding:14px 16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06)">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;margin-bottom:10px">${name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${picks.map(([label, val]) => {
          const team = val ? val.split(' - ')[0] : '—';
          const pts = val && val.includes(' - ') ? val.split(' - ')[1] : '';
          return `<div style="background:var(--dark-4);border-radius:6px;padding:8px 10px">
            <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:3px">${label}</div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600">${team}</div>
            ${pts ? `<div style="font-size:11px;color:var(--gold)">${pts}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  document.getElementById('mobilePicks').innerHTML = html;
}

function updateStatus(data, metaData) {
  const players = data.slice(1).filter(r => r[1] && r[1].trim() !== '');
  const bots = players.filter(r => (r[9] || '').trim().toUpperCase() === 'TRUE');
  const humans = players.filter(r => (r[9] || '').trim().toUpperCase() !== 'TRUE');
  document.getElementById('statPlayers').textContent = humans.length;
  document.getElementById('statPrize').textContent = `$${humans.length * 20}`;
  const botsEl = document.getElementById('statBots');
  if (bots.length > 0) {
    botsEl.textContent = `+ ${bots.length} AI bot${bots.length > 1 ? 's' : ''}`;
  } else {
    botsEl.textContent = '';
  }
  // Read Last Updated from Meta tab row 1 col B (index 1)
  const lastUpdated = (metaData && metaData[1] && metaData[1][1]) ? metaData[1][1] : '—';
  document.getElementById('statUpdated').textContent = lastUpdated;
}

function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const lb = document.getElementById('leaderboardSection');
  const mp = document.getElementById('mobilePicks');

  if (tab === 'leaderboard') {
    lb.classList.remove('hidden');
    mp.classList.remove('visible');
  } else {
    lb.classList.add('hidden');
    mp.classList.add('visible');
  }
}

// Load on start
loadData();
// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
