  v1.7 — Now Playing strip (teal/cream states), Schedule tab, Starting Soon state,

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
<link rel="icon" type="image/png" href="trionda.png">
<title>2026 Dutton Ranch World Cup Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F0D060;
    --red: #C8102E;
    --dark: #0a0a0f;
    --dark-2: #111118;
    --dark-3: #1a1a24;
    --dark-4: #22222e;
    --text: #e8e8f0;
    --text-muted: #a0a0c0;
    --green: #00843D;
    --blue: #003DA5;
    --teal: #4eb8b8;
    --bronze-light: #e8a050;
    --cream: #d8c8a8;
    --cream-border: rgba(216,200,168,0.32);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-art {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-art::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,61,165,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(200,16,46,0.14) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(212,175,55,0.06) 0%, transparent 70%);
  }

  .bg-soccer-ball {
    position: absolute;
    width: 600px;
    height: 600px;
    top: -100px;
    right: -150px;
    opacity: 0.04;
    border-radius: 50%;
    border: 80px solid white;
    animation: slowSpin 60s linear infinite;
  }

  .bg-soccer-ball::before {
    content: '';
    position: absolute;
    width: 80px;
    height: 80px;
    background: white;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .bg-lines {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 80px,
        rgba(255,255,255,0.015) 80px,
        rgba(255,255,255,0.015) 81px
      );
  }

  @keyframes slowSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ── LAYOUT ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 40px 0 36px;
    position: relative;
  }

  .header-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
    text-decoration: none;
    -webkit-text-decoration: none;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 88px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: white;
    text-shadow: 0 0 60px rgba(212,175,55,0.3);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
    text-decoration: none;
    -webkit-text-decoration: none;
  }

  .header-title span {
    color: var(--gold);
    text-decoration: none;
    -webkit-text-decoration: none;
  }

  .header-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--text-muted);
    margin-top: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  .header-divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
  }

  .status-item {
    text-align: center;
  }

  .status-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .status-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
  }

  /* ── SECTION HEADERS ── */
  .section-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: white;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(212,175,55,0.4), transparent);
  }

  /* ── LEADERBOARD ── */
  .leaderboard {
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.6s;
  }

  .lb-header-row {
    display: grid;
    grid-template-columns: 44px 1fr 80px;
    gap: 8px;
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .lb-row {
    display: grid;
    grid-template-columns: 44px 1fr 80px;
    gap: 8px;
    align-items: center;
    padding: 14px 16px;
    margin-bottom: 6px;
    border-radius: 8px;
    background: var(--dark-3);
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .lb-row::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--text-muted);
    opacity: 0.3;
  }

  .lb-row.rank-1::before { background: var(--gold); opacity: 1; }
  .lb-row.rank-2::before { background: #C0C0C0; opacity: 1; }
  .lb-row.rank-3::before { background: #CD7F32; opacity: 1; }

  .lb-row.rank-1 { background: linear-gradient(135deg, rgba(212,175,55,0.08), var(--dark-3)); }

  .lb-row:hover {
    background: var(--dark-4);
    border-color: rgba(212,175,55,0.2);
    transform: translateX(2px);
  }

  .lb-row.expanded {
    border-color: rgba(212,175,55,0.3);
  }

  .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1;
  }

  .rank-1 .rank-num { color: var(--gold); }
  .rank-2 .rank-num { color: #C0C0C0; }
  .rank-3 .rank-num { color: #CD7F32; }

  .player-info { min-width: 0; }

  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-picks-preview {
    font-size: 15px;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-real-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    color: #4eb8b8;
    letter-spacing: 0.04em;
    margin-top: 1px;
  }

  .bot-notice {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: #4eb8b8;
    letter-spacing: 0.5px;
    margin-top: 3px;
  }

  .lb-row.is-bot {
    border-left: 3px solid rgba(78,184,184,0.35);
  }

  .lb-row.is-bot .total-pts {
    color: #606080;
  }

  .player-total {
    text-align: right;
  }

  .total-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--gold);
    line-height: 1;
  }

  .total-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── EXPANDED PICKS ── */
  .picks-detail {
    display: none;
    padding: 12px 16px 4px;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin-top: 10px;
    grid-column: 1 / -1;
  }

  .picks-detail.open { display: block; }

  .picks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }

  .pick-chip {
    background: var(--dark-4);
    border-radius: 6px;
    padding: 8px 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .pick-chip-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .pick-chip-team {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pick-chip-pts {
    font-size: 12px;
    color: var(--gold);
    margin-top: 2px;
  }

  /* ── PICKS TABLE (mobile-friendly) ── */
  .picks-section {
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.8s;
  }

  .picks-table {
    width: 100%;
    border-collapse: collapse;
  }

  .picks-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .picks-table td {
    padding: 12px 10px;
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }

  .picks-table tr:hover td {
    background: rgba(255,255,255,0.02);
  }

  .picks-table .player-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── LOADING / ERROR ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(212,175,55,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }


  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .picks-section { display: none; }
    .header-title { font-size: 52px; }
    .status-bar { gap: 20px; }
    .lb-row { padding: 12px; }
  }

  .tab-bar {
    display: none;
    margin-bottom: 24px;
  }

  @media (max-width: 600px) {
    .tab-bar { display: flex; gap: 0; border-radius: 8px; overflow: hidden; background: var(--dark-3); }
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--dark-4);
    color: var(--gold);
  }

  .mobile-picks { display: none; }

  @media (max-width: 600px) {
    .mobile-picks.visible { display: block; }
    .leaderboard.hidden { display: none; }
  }

  /* ── SCHEDULE SECTION ── */
  .schedule-section { display: none; }
  @media (max-width: 600px) {
    .schedule-section.visible { display: block; }
  }

  /* ── NOW PLAYING STRIP ── */
  .now-playing-strip {
    display: none;
    margin-bottom: 16px;
  }
  .now-playing-strip.visible { display: block; }

  .now-playing-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .eyebrow-live  { color: #4eb8b8; }
  .eyebrow-soon  { color: #d8c8a8; }

  .now-playing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-live { background: #4eb8b8; animation: gentlePulse 2.5s ease-in-out infinite; }
  .dot-soon { background: #d8c8a8; animation: gentlePulse 2.5s ease-in-out infinite; }

  .strip-scroll {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    overflow-x: auto;
  }

  .now-card {
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    min-width: 0;
  }
  .now-card-live {
    background: rgba(78,184,184,0.08);
    border: 1px solid rgba(78,184,184,0.28);
  }
  .now-card-soon {
    background: rgba(216,200,168,0.07);
    border: 1px solid rgba(216,200,168,0.28);
  }

  .now-card-teams {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: #e8e8f0;
    line-height: 1.3;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }
  .now-card-vs {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    color: #a0a0c0;
    letter-spacing: 1px;
    margin: 0 2px;
  }
  .now-card-watch {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #4eb8b8;
    letter-spacing: 0.5px;
  }
  .now-card-watch-soon { color: #d8c8a8; }
  .now-card-started {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: #a0a0c0;
    margin-top: 2px;
  }
  .now-card-kickoff {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: rgba(216,200,168,0.7);
    margin-top: 2px;
  }

  /* ── GAME CARDS ── */
  .game-card {
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
    text-decoration: none;
    color: inherit;
  }
  .gc-teams { flex: 1 1 70%; min-width: 0; }
  .gc-meta  { flex: 0 0 30%; text-align: right; padding-top: 28px; }

  .gc-phase {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .gc-team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: #e8e8f0;
    line-height: 1.25;
  }
  .gc-divider { height: 1px; margin: 8px 0; }
  .gc-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .gc-net {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .gc-net-soon { color: #d8c8a8; }
  .gc-soon-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: #d8c8a8;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .gc-watch {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #4eb8b8;
    margin-bottom: 3px;
  }
  .gc-live-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: #4eb8b8;
    letter-spacing: 1.5px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 5px;
    line-height: 1;
  }
  .gc-live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4eb8b8;
    flex-shrink: 0;
    animation: gentlePulse 2.5s ease-in-out infinite;
  }
  .gc-full-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── TIER CLASSES ── */
  .tier-group { background: #1a1a24; border: 1px solid rgba(255,255,255,0.06); }
  .tier-group .gc-phase     { color: #a0a0c0; }
  .tier-group .gc-time      { color: #D4AF37; }
  .tier-group .gc-net       { color: #a0a0c0; }
  .tier-group .gc-full-time { color: #a0a0c0; }
  .tier-group .gc-divider   { background: linear-gradient(90deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.01) 40%, transparent 40%); }

  .tier-r32 { background: #1a1a24; border: 1px solid rgba(184,168,120,0.22); }
  .tier-r32 .gc-phase     { color: #b8a878; }
  .tier-r32 .gc-time      { color: #D4AF37; }
  .tier-r32 .gc-net       { color: #b8a878; }
  .tier-r32 .gc-full-time { color: #b8a878; }
  .tier-r32 .gc-divider   { background: linear-gradient(90deg, rgba(184,168,120,0.45) 0%, rgba(184,168,120,0.02) 40%, transparent 40%); }

  .tier-r16 { background: #1a1a24; border: 1px solid rgba(212,175,55,0.3); }
  .tier-r16 .gc-phase     { color: #D4AF37; }
  .tier-r16 .gc-time      { color: #D4AF37; }
  .tier-r16 .gc-net       { color: #D4AF37; }
  .tier-r16 .gc-full-time { color: #D4AF37; }

<script>
const SHEET_ID = '13tYn4PD4_09pZjxbfIO3isLue7VroJaPd5l-olkd-dA';
const LEADERBOARD_GID = '0'; // default sheet (Leaderboard tab)

// We'll fetch the Leaderboard tab by name using the CSV export endpoint
// which works for public sheets without an API key
async function loadData() {
  document.getElementById('leaderboardRows').innerHTML = `<div class="loading"><div class="loading-spinner"></div>Loading standings...</div>`;

  try {
    const [leaderboardData, metaData, scheduleData] = await Promise.all([
      fetchSheet('Leaderboard'),
      fetchSheet('Meta'),
      fetchSheet('Schedule')
    ]);
    renderLeaderboard(leaderboardData);
    updateStatus(leaderboardData, metaData);
    renderSchedule(scheduleData);
    renderNowPlayingStrip(scheduleData);
  } catch(e) {
    document.getElementById('leaderboardRows').innerHTML = `<div class="loading">⚠️ Could not load data. Make sure the sheet is set to "Anyone with the link can view".<br><br><small>${e.message}</small></div>`;
  }
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  // gviz wraps response in /*O_o*/ google.visualization.Query.setResponse({...});
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return parseGviz(json);
}

function parseGviz(json) {
  const rows = json.table.rows;
  const cols = json.table.cols;
  // Build header row from col labels
  const header = cols.map(c => c.label || '');
  const data = [header];
  rows.forEach(row => {
    const rawCells = row.c || [];
    while (rawCells.length < cols.length) rawCells.push(null);
    const cells = rawCells.map(cell => {
      if (cell === null || cell === undefined) return '';
      if (cell.v === null || cell.v === undefined) return '';
      return cell.f !== undefined && cell.f !== null ? cell.f : String(cell.v);
    });
    data.push(cells);
  });
  return data;
}

function renderLeaderboard(data) {
  if (!data || data.length < 2) {
    document.getElementById('leaderboardRows').innerHTML = '<div class="loading">No data yet — check back after June 11!</div>';
    return;
  }

  // Row 0 = headers, rows 1+ = players
  // Cols: A=Rank, B=Player, C=Total, D=1st, E=2nd, F=3rd, G=4th, H=Debut, I=FanFav, J=IsBot, K=RealName
  const players = data.slice(1).filter(r => r[1] && r[1].trim() !== '');

  let html = '';
  players.forEach((row, idx) => {
    const rank = row[0] || (idx + 1);
    const name = row[1] || '';
    const total = row[2] || '0';
    const p1 = row[3] || '—';
    const p2 = row[4] || '—';
    const p3 = row[5] || '—';
    const p4 = row[6] || '—';
    const virgin = row[7] || '—';
    const fanfav = row[8] || '—';
    const isBot = (row[9] || '').trim().toUpperCase() === 'TRUE';
    const realName = (row[10] || '').trim();

    const rankClass = rank == 1 ? 'rank-1' : rank == 2 ? 'rank-2' : rank == 3 ? 'rank-3' : '';
    const botClass = isBot ? 'is-bot' : '';

    const t1raw = p1.split(' - ')[0];
    const t2raw = p2.split(' - ')[0];
    const t1parts = t1raw.indexOf(' ') > -1 ? [t1raw.slice(0, t1raw.indexOf(' ')), t1raw.slice(t1raw.indexOf(' ') + 1)] : ['', t1raw];
    const t2parts = t2raw.indexOf(' ') > -1 ? [t2raw.slice(0, t2raw.indexOf(' ')), t2raw.slice(t2raw.indexOf(' ') + 1)] : ['', t2raw];
    const goldStyle = `background:linear-gradient(90deg,#b8882a 0%,#D4AF37 30%,#f5e27a 55%,#D4AF37 75%,#a87c20 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;
    const silverStyle = `background:linear-gradient(90deg,#707085 0%,#b0b0c8 20%,#e8e8f4 45%,#ffffff 55%,#c0c0d8 75%,#808090 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;
    const preview = `<span>${t1parts[0]} </span><span style="${goldStyle}">${t1parts[1]}</span><span style="color:#ffffff;font-weight:700;">&nbsp;&nbsp;·&nbsp;&nbsp;</span><span>${t2parts[0]} </span><span style="${silverStyle}">${t2parts[1]}</span>`;
    const botNotice = isBot ? `<div class="bot-notice">BOT — Not eligible for prize pool</div>` : '';

    html += `
      <div class="lb-row ${rankClass} ${botClass}" onclick="togglePicks(this)">
        <div class="rank-num">${rank}</div>
        <div class="player-info">
          <div class="player-name">${name}</div>
          ${realName ? `<div class="player-real-name">${realName}</div>` : ''}
          ${botNotice}
          <div class="player-picks-preview">${preview}</div>
        </div>
        <div class="player-total">
          <div class="total-pts">${total}</div>
          <div class="total-label">pts</div>
        </div>
        <div class="picks-detail" style="grid-column:1/-1">
          <div class="picks-grid">
            ${pickChip('🥇 1st', p1)}
            ${pickChip('🥈 2nd', p2)}
            ${pickChip('🥉 3rd', p3)}
            ${pickChip('🎗️ 4th', p4)}
            ${pickChip('💫 Debut', virgin)}
            ${pickChip('⭐ Fan Fav', fanfav)}
          </div>
        </div>
      </div>`;
  });

  document.getElementById('leaderboardRows').innerHTML = html;

  // Also render picks table
  renderPicksTable(players);
  renderMobilePicks(players);
}

function pickChip(label, value) {
  const parts = value.split(' - ');
  const team = parts[0] || value;
  const pts = parts[1] || '';
  return `<div class="pick-chip">
    <div class="pick-chip-label">${label}</div>
    <div class="pick-chip-team">${team}</div>
    ${pts ? `<div class="pick-chip-pts">${pts}</div>` : ''}
  </div>`;
}

function togglePicks(row) {
  const detail = row.querySelector('.picks-detail');
  if (!detail) return;
  const isOpen = detail.classList.contains('open');
  // Close all
  document.querySelectorAll('.picks-detail.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.lb-row.expanded').forEach(r => r.classList.remove('expanded'));
  if (!isOpen) {
    detail.classList.add('open');
    row.classList.add('expanded');
  }
}

function renderPicksTable(players) {
  let html = `<table class="picks-table">
    <thead><tr>
      <th>Player</th>
      <th>🥇 1st</th>
      <th>🥈 2nd</th>
      <th>🥉 3rd</th>
      <th>🎗️ 4th</th>
      <th>💫 Debut</th>
      <th>⭐ Fan Fav</th>
    </tr></thead><tbody>`;

  players.forEach(row => {
    const name = row[1];
    const picks = [row[3],row[4],row[5],row[6],row[7],row[8]].map(p => {
      if (!p) return '<td>—</td>';
      const team = p.split(' - ')[0];
      return `<td>${team}</td>`;
    });
    html += `<tr><td class="player-cell">${name}</td>${picks.join('')}</tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('picksTableWrap').innerHTML = html;
}

function renderMobilePicks(players) {
  let html = '<div class="section-header"><img src="trionda.png" style="width:20px;height:20px;vertical-align:-4px;margin-right:6px;">All Picks</div>';
  players.forEach(row => {
    const name = row[1];
    const picks = [
      ['🥇 1st', row[3]], ['🥈 2nd', row[4]], ['🥉 3rd', row[5]],
      ['🎗️ 4th', row[6]], ['💫 Debut', row[7]], ['⭐ Fan Fav', row[8]]
    ];
    html += `<div style="background:var(--dark-3);border-radius:8px;padding:14px 16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06)">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;margin-bottom:10px">${name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${picks.map(([label, val]) => {
          const team = val ? val.split(' - ')[0] : '—';
          const pts = val && val.includes(' - ') ? val.split(' - ')[1] : '';
          return `<div style="background:var(--dark-4);border-radius:6px;padding:8px 10px">
            <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:3px">${label}</div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600">${team}</div>
            ${pts ? `<div style="font-size:11px;color:var(--gold)">${pts}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  document.getElementById('mobilePicks').innerHTML = html;
}

function updateStatus(data, metaData) {
  const players = data.slice(1).filter(r => r[1] && r[1].trim() !== '');
  const bots = players.filter(r => (r[9] || '').trim().toUpperCase() === 'TRUE');
  const humans = players.filter(r => (r[9] || '').trim().toUpperCase() !== 'TRUE');
  document.getElementById('statPlayers').textContent = humans.length;
  document.getElementById('statPrize').textContent = `$${humans.length * 20}`;
  const botsEl = document.getElementById('statBots');
  if (bots.length > 0) {
    botsEl.textContent = `+ ${bots.length} AI bot${bots.length > 1 ? 's' : ''}`;
  } else {
    botsEl.textContent = '';
  }
  // Read Last Updated from Meta tab row 1 col B (index 1)
  const lastUpdated = (metaData && metaData[1] && metaData[1][1]) ? metaData[1][1] : '—';
  document.getElementById('statUpdated').textContent = lastUpdated;
}

function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const lb       = document.getElementById('leaderboardSection');
  const mp       = document.getElementById('mobilePicks');
  const sched    = document.getElementById('scheduleSection');
  const strip    = document.getElementById('nowPlayingStrip');

  // Reset all
  lb.classList.remove('hidden');
  mp.classList.remove('visible');
  sched.classList.remove('visible');

  if (tab === 'leaderboard') {
    // strip visible if it has cards
    if (strip.dataset.hasCards === 'true') strip.classList.add('visible');
  } else if (tab === 'schedule') {
    lb.classList.add('hidden');
    sched.classList.add('visible');
    strip.classList.remove('visible'); // hide strip on schedule tab
  }
}

function getTournamentStatus() {
  const now = new Date();
  const start = new Date('2026-06-11T00:00:00');
  const finalDay = new Date('2026-07-19T00:00:00');
  const dayAfterFinal = new Date('2026-07-20T00:00:00');

  if (now < start) {
    return { label: 'Tournament', value: 'Starts Jun 11' };
  } else if (now < dayAfterFinal) {
    const msPerDay = 1000 * 60 * 60 * 24;
    const daysLeft = Math.ceil((finalDay - now) / msPerDay);
    return { label: 'Days to Final', value: daysLeft > 0 ? String(daysLeft) : '1' };
  } else {
    return { label: 'Tournament', value: 'Complete' };
  }
}

function updateTournamentStatus() {
  const { label, value } = getTournamentStatus();
  document.getElementById('statTournamentLabel').textContent = label;
  document.getElementById('statTournament').textContent = value;
}

// ── SCHEDULE HELPERS ──

function getPhaseLabel(row) {
  const phase = row[6];
  const group = row[7];
  const gameNum = row[8];
  if (phase === 'GROUP') return `Group ${group} · Game ${gameNum}`;
  if (phase === 'R32')   return 'Round of 32';
  if (phase === 'R16')   return 'Round of 16';
  if (phase === 'QF')    return 'Quarter-Final';
  if (phase === 'SF')    return 'Semi-Final';
  if (phase === '3P')    return '3rd Place Match';
  if (phase === 'FINAL') return '⭐ World Cup Final';
  return phase;
}

function getTierClass(phase) {
  const map = { GROUP:'tier-group', R32:'tier-r32', R16:'tier-r16', QF:'tier-qf', SF:'tier-sf', '3P':'tier-3p', FINAL:'tier-final' };
  return map[phase] || 'tier-group';
}

function getCardState(kickoffUTC, phase) {
  const now = Date.now();
  const kickoff = new Date(kickoffUTC).getTime();
  const minsFromKickoff = (now - kickoff) / 60000;
  const isGroup = phase === 'GROUP';
  if (minsFromKickoff < -30)                       return 'standard';
  if (minsFromKickoff < 0)                         return 'starting-soon';
  if (minsFromKickoff < 120)                       return 'live';
  if (!isGroup && minsFromKickoff < 180)           return 'continued';
  return 'full-time';
}

function isInStripWindow(kickoffUTC, phase) {
  const minsFromKickoff = (Date.now() - new Date(kickoffUTC).getTime()) / 60000;
  if (minsFromKickoff >= -30 && minsFromKickoff < 0)   return 'soon';
  if (minsFromKickoff >= 0   && minsFromKickoff < 120) return 'live';
  return null;
}

function getLocalTime(kickoffUTC) {
  return new Date(kickoffUTC).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function getLocalDateStr(kickoffUTC) {
  const d = new Date(kickoffUTC);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderSchedule(data) {
  const el = document.getElementById('scheduleCards');
  if (!data || data.length < 2) {
    el.innerHTML = '<div class="loading">No schedule data yet.</div>';
    return;
  }

  const today = getTodayStr();
  // Derive local date from UTC timestamp — ignore col A entirely
  const rows = data.slice(1).filter(r => r[1] && r[1].trim() !== '');
  const todayRows = rows.filter(r => getLocalDateStr(r[1]) === today);

  // Find next match day after today (always shown regardless of today's games)
  const futureRows = rows
    .filter(r => getLocalDateStr(r[1]) > today)
    .sort((a, b) => new Date(a[1]) - new Date(b[1]));
  const nextDateStr = futureRows.length ? getLocalDateStr(futureRows[0][1]) : null;
  const nextRows = nextDateStr ? futureRows.filter(r => getLocalDateStr(r[1]) === nextDateStr) : [];
  const nextLabel = nextDateStr
    ? new Date(futureRows[0][1]).toLocaleDateString([], { weekday: 'short', month: 'long', day: 'numeric' })
    : '';

  let html = `<div class="schedule-day-header">${new Date().toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'})}</div>`;

  if (todayRows.length === 0) {
    html += `<div class="no-games-inline">
      <div class="no-games-main">No Games Today</div>
      <div class="no-games-sub">Rest Day</div>
    </div>`;
  } else {
    todayRows.forEach(r => {
      const kickoffUTC     = r[1];
      const phase          = r[6];
      const state          = getCardState(kickoffUTC, phase);
      const tierClass      = getTierClass(phase);
      const localTime      = getLocalTime(kickoffUTC);
      const broadcaster    = r[9];
      const broadcasterUrl = r[10];
      const phaseLabel     = getPhaseLabel(r);

      let stateClass = '';
      if (state === 'starting-soon') stateClass = 'state-starting-soon';
      else if (state === 'live')      stateClass = 'state-live';
      else if (state === 'continued') stateClass = 'state-continued';
      else if (state === 'full-time') stateClass = 'state-full-time';

      let metaHtml = `<div class="gc-time">${localTime}</div>`;
      if (state === 'standard') {
        metaHtml += `<div class="gc-net">${broadcaster}</div>`;
      } else if (state === 'starting-soon') {
        metaHtml += `<div class="gc-net gc-net-soon">${broadcaster}</div><div class="gc-soon-label">Starting Soon</div>`;
      } else if (state === 'live') {
        metaHtml += `<div class="gc-watch">Watch on ${broadcaster}</div><div class="gc-live-badge"><span class="gc-live-dot"></span>LIVE</div>`;
      } else if (state === 'continued') {
        metaHtml += `<div class="gc-watch">Watch on ${broadcaster}</div>`;
      } else if (state === 'full-time') {
        metaHtml += `<div class="gc-net">${broadcaster}</div><div class="gc-full-time">Full Time</div>`;
      }

      const isFinal = phase === 'FINAL';
      const homeTeam = isFinal
        ? `${r[4]} <span class="gc-team-shimmer">${r[2]}</span>`
        : `${r[4]} ${r[2]}`;
      const awayTeam = isFinal
        ? `${r[5]} <span class="gc-team-shimmer">${r[3]}</span>`
        : `${r[5]} ${r[3]}`;

      html += `<div class="game-card ${tierClass} ${stateClass}" onclick="window.open('${broadcasterUrl}','_blank')">
        <div class="gc-teams">
          <div class="gc-phase">${phaseLabel}</div>
          <div class="gc-team-name">${homeTeam}</div>
          <div class="gc-divider"></div>
          <div class="gc-team-name">${awayTeam}</div>
        </div>
        <div class="gc-meta">${metaHtml}</div>
      </div>`;
    });
  }

  // Coming Up — always shown below today's content
  if (nextRows.length) {
    html += `<div class="coming-up-header">Coming Up · ${nextLabel}</div>`;
    nextRows.forEach(r => {
      html += `<div class="preview-row">
        <div>
          <div class="preview-row-teams">${r[4]} ${r[2]} vs ${r[5]} ${r[3]}</div>
          <div class="preview-row-phase">${getPhaseLabel(r)}</div>
        </div>
        <div class="preview-row-time">${getLocalTime(r[1])}</div>
      </div>`;
    });
  }

  el.innerHTML = html;
}


function renderNowPlayingStrip(data) {
  const strip     = document.getElementById('nowPlayingStrip');
  const eyebrow   = document.getElementById('stripEyebrow');
  const cardsEl   = document.getElementById('stripCards');

  if (!data || data.length < 2) return;

  const now = Date.now();
  const todayLocal = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD in local time

  const rows = data.slice(1).filter(r => r[0] && r[1]);

  // All of today's games sorted chronologically
  const todaysRows = rows
    .filter(r => new Date(r[1]).toLocaleDateString('en-CA') === todayLocal)
    .sort((a, b) => new Date(a[1]) - new Date(b[1]));

  // A game is finished if enough time has passed since kickoff
  const isFinished = (r) => {
    const mins = (now - new Date(r[1]).getTime()) / 60000;
    const isGroup = r[6] === 'GROUP';
    return isGroup ? mins >= 120 : mins >= 180;
  };

  // Next 2 non-finished games of the day
  const stripRows = todaysRows
    .filter(r => !isFinished(r))
    .slice(0, 2)
    .map(r => ({ row: r, window: isInStripWindow(r[1], r[6]) || 'upcoming' }));

  if (stripRows.length === 0) {
    strip.dataset.hasCards = 'false';
    return;
  }

  const liveCount = stripRows.filter(x => x.window === 'live').length;
  const soonCount = stripRows.filter(x => x.window === 'soon').length;

  // Eyebrow
  if (liveCount > 0) {
    eyebrow.className = 'now-playing-eyebrow eyebrow-live';
    eyebrow.innerHTML = `<span class="now-playing-dot dot-live"></span> Now Playing`;
  } else if (soonCount > 0) {
    eyebrow.className = 'now-playing-eyebrow eyebrow-soon';
    eyebrow.innerHTML = `<span class="now-playing-dot dot-soon"></span> Starting Soon`;
  } else {
    eyebrow.className = 'now-playing-eyebrow eyebrow-soon';
    eyebrow.innerHTML = `<span class="now-playing-dot dot-soon"></span> Up Next`;
  }

  // Cards
  let html = '';
  stripRows.forEach(({ row: r, window: w }) => {
    const localTime = getLocalTime(r[1]);
    const broadcaster = r[9];
    const broadcasterUrl = r[10];
    if (w === 'live') {
      html += `<div class="now-card now-card-live" onclick="window.open('${broadcasterUrl}','_blank')">
        <div class="now-card-teams">${r[4]} ${r[2]}<span class="now-card-vs">vs</span>${r[5]} ${r[3]}</div>
        <div class="now-card-watch">Watch on ${broadcaster}</div>
        <div class="now-card-started">Started ${localTime}</div>
      </div>`;
    } else if (w === 'soon') {
      html += `<div class="now-card now-card-soon" onclick="window.open('${broadcasterUrl}','_blank')">
        <div class="now-card-teams">${r[4]} ${r[2]}<span class="now-card-vs">vs</span>${r[5]} ${r[3]}</div>
        <div class="now-card-watch now-card-watch-soon">Watch on ${broadcaster}</div>
        <div class="now-card-kickoff">Kicks off ${localTime}</div>
      </div>`;
    } else {
      html += `<div class="now-card now-card-soon" onclick="window.open('${broadcasterUrl}','_blank')">
        <div class="now-card-teams">${r[4]} ${r[2]}<span class="now-card-vs">vs</span>${r[5]} ${r[3]}</div>
        <div class="now-card-watch now-card-watch-soon">Watch on ${broadcaster}</div>
        <div class="now-card-kickoff">Kicks off ${localTime}</div>
      </div>`;
    }
  });

  cardsEl.innerHTML = html;
  strip.dataset.hasCards = 'true';
  // Only show strip if we're on the standings tab
  const standingsActive = document.querySelector('.tab-btn.active') &&
    document.querySelector('.tab-btn.active').textContent.includes('Standings');
  if (standingsActive || !document.querySelector('.tab-bar').offsetParent) {
    strip.classList.add('visible');
  }
}

// ── END SCHEDULE ──

// Load on start
loadData();
updateTournamentStatus();
// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);

// ── PULL TO REFRESH ──
(function() {
  const THRESHOLD    = 80;  // px drag needed to trigger refresh
  const indicator    = document.getElementById('ptr-indicator');
  const label        = document.getElementById('ptr-label');
  const arrow        = indicator.querySelector('.ptr-arrow');

  let startY = 0;
  let pulling = false;
  let refreshing = false;

  document.addEventListener('touchstart', e => {
    // Only activate when scrolled to top
    if (window.scrollY === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling || refreshing) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0) { pulling = false; return; }

    const progress = Math.min(dy / THRESHOLD, 1);
    const height   = Math.min(dy * 0.4, 48);

    indicator.classList.add('visible');
    indicator.style.height = height + 'px';
    arrow.style.transform  = `rotate(${progress * 180}deg)`;
    label.textContent      = progress >= 1 ? 'Release to refresh' : 'Pull to refresh';
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!pulling || refreshing) return;
    pulling = false;

    const dy = e.changedTouches[0].clientY - startY;
    if (dy >= THRESHOLD) {
      // Trigger refresh
      refreshing = true;
      indicator.classList.add('refreshing');
      indicator.style.height = '48px';
      label.textContent = 'Refreshing...';

      loadData().finally(() => {
        refreshing = false;
        indicator.classList.remove('refreshing', 'visible');
        indicator.style.height = '0';
        arrow.style.transform  = 'rotate(0deg)';
        label.textContent      = 'Pull to refresh';
      });
    } else {
      // Snap back without refreshing
      indicator.classList.remove('visible');
      indicator.style.height = '0';
      arrow.style.transform  = 'rotate(0deg)';
    }
  }, { passive: true });
})();
</script>
